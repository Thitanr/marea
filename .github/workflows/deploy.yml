name: MAREA CI/CD — Test, Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN — deploy uses its own scoped Cloudflare secret
permissions:
  contents: read

jobs:
  build_and_deploy:
    name: Test, Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build assets
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          export CLOUDFLARE_API_TOKEN="${{ secrets.MAREA }}"
          export CLOUDFLARE_ACCOUNT_ID="5df89a67326725077c0c1e7a6d7c9328"
          npx wrangler pages deploy dist/ --project-name=marea-tide --commit-dirty=true

