name: MAREA CI/CD — Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Marea to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: |
          export CLOUDFLARE_API_TOKEN="${{ secrets.MAREA }}"
          export CLOUDFLARE_ACCOUNT_ID="5df89a67326725077c0c1e7a6d7c9328"
          npx wrangler pages deploy . --project-name=marea-tide --commit-dirty=true
